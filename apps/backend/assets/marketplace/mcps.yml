# MCP Marketplace - curated list of MCP servers for Makima Agent
# Format compatible with Zoo Code / standard MCP protocol
items:
  - id: brave-search
    name: Brave Search
    description: Comprehensive web and local search with smart filtering and pagination via Brave Search API.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/brave-search
    tags:
      - search
      - web-search
      - brave-api
    prerequisites:
      - Brave Search account (free tier available)
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-brave-search"],
            "env": {
              "BRAVE_API_KEY": "{{BRAVE_API_KEY}}"
            }
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "-e", "BRAVE_API_KEY", "mcp/brave-search"],
            "env": {
              "BRAVE_API_KEY": "{{BRAVE_API_KEY}}"
            }
          }
    parameters:
      - name: Brave API Key
        key: BRAVE_API_KEY
        placeholder: your_brave_api_key_here

  - id: filesystem
    name: File System
    description: Read, write, move, and edit files with pattern matching and formatting capabilities.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
    tags:
      - filesystem
      - file-management
      - directory-operations
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-filesystem", "{{ALLOWED_DIRECTORY}}"]
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "--mount", "type=bind,src={{ALLOWED_DIRECTORY}},dst=/projects", "mcp/filesystem", "/projects"]
          }
    parameters:
      - name: Allowed Directory
        key: ALLOWED_DIRECTORY
        placeholder: /Users/username/Documents

  - id: context7
    name: Context7
    description: Up-to-date code documentation and examples for LLMs. Eliminates outdated or hallucinated API information.
    author: upstash
    url: https://github.com/upstash/context7
    tags:
      - documentation
      - code-examples
      - api-reference
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@upstash/context7-mcp"]
          }
      - name: Remote Server
        content: |
          {
            "type": "streamable-http",
            "url": "https://mcp.context7.com/mcp"
          }

  - id: github
    name: GitHub
    description: Interact with GitHub repositories, issues, pull requests, and more.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/github
    tags:
      - github
      - version-control
      - issues
      - pull-requests
    prerequisites:
      - GitHub Personal Access Token
    content:
      - name: NPX
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-github"],
            "env": {
              "GITHUB_PERSONAL_ACCESS_TOKEN": "{{GITHUB_TOKEN}}"
            }
          }
      - name: Docker
        prerequisites:
          - Docker
        content: |
          {
            "command": "docker",
            "args": ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "mcp/github"],
            "env": {
              "GITHUB_PERSONAL_ACCESS_TOKEN": "{{GITHUB_TOKEN}}"
            }
          }
    parameters:
      - name: GitHub Personal Access Token
        key: GITHUB_TOKEN
        placeholder: ghp_xxxxxxxxxxxxxxxxxxxx

  - id: postgres
    name: PostgreSQL
    description: Query and manage PostgreSQL databases. Supports read-only and read-write modes.
    author: modelcontextprotocol
    url: https://github.com/modelcontextprotocol/servers/tree/main/src/postgres
    tags:
      - database
      - postgresql
      - sql
    content:
      - name: NPX (Read-Only)
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-postgres", "{{DATABASE_URL}}"]
          }
      - name: NPX (Read-Write)
        prerequisites:
          - Node.js
        content: |
          {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-postgres", "--allow-write", "{{DATABASE_URL}}"]
          }
    parameters:
      - name: Database URL
        key: DATABASE_URL
        placeholder: postgresql://user:password@localhost:5432/dbname

