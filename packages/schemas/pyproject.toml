[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "makima-schemas"
version = "0.1.0"
description = "Event protocol and DTO definitions for Makima Agent Backend"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/makima_schemas"]