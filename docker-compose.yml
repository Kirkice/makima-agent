version: "3.9"

services:
  # ── 基础设施 ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: makima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-makima}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-makima}
      POSTGRES_DB: ${POSTGRES_DB:-makima}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-makima}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: makima-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: makima-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-makima}:${POSTGRES_PASSWORD:-makima}@postgres:5432/${POSTGRES_DB:-makima}
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  tool-runtime:
    build:
      context: .
      dockerfile: infra/docker/tool-runtime.Dockerfile
    container_name: makima-tool-runtime
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - RUST_LOG=info
    volumes:
      - /tmp/makima-sandbox:/tmp/makima-sandbox

volumes:
  postgres_data:
  redis_data: